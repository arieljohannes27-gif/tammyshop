services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartinventory
      POSTGRES_PASSWORD: smartinventory
      POSTGRES_DB: smart_inventory_os
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
